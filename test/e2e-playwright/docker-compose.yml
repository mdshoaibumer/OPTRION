version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: optrion_e2e
    ports:
      - "5432:5432"
    volumes:
      - postgres_playwright:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optrion_e2e"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - optrion-playwright

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_playwright:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - optrion-playwright

volumes:
  postgres_playwright:
    driver: local
  redis_playwright:
    driver: local

networks:
  optrion-playwright:
    driver: bridge
