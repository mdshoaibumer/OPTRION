version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: optrion
      POSTGRES_PASSWORD: optrion_local
      POSTGRES_DB: optrion
    ports:
      - target: 5432
        published: 0
        protocol: tcp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optrion -d optrion"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - optrion

  redis:
    image: redis:7-alpine
    ports:
      - target: 6379
        published: 0
        protocol: tcp
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - optrion

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  optrion:
    driver: bridge
