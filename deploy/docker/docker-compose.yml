## ------------------------------------------
## OPTRION Docker Compose — Local Development
## ------------------------------------------
## Usage:
##   docker compose up -d        (start all services)
##   docker compose logs -f app  (follow app logs)
##   docker compose down -v      (stop and remove volumes)
## ------------------------------------------

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../../.env.local
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - optrion

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: optrion
      POSTGRES_PASSWORD: optrion_local
      POSTGRES_DB: optrion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optrion -d optrion"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - optrion

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - optrion

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  optrion:
    driver: bridge
